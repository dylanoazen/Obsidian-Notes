<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Study Inbox</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU3R1ZHkgSW5ib3giLCJzaG9ydF9uYW1lIjoiSW5ib3giLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBhMGEwYSIsInRoZW1lX2NvbG9yIjoiIzBhMGEwYSJ9">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
    --border: #252525; --accent: #e8553a; --accent2: #ff7b5f;
    --text: #e4e4e4; --muted: #666; --green: #4ade80; --yellow: #facc15;
  }

  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column;
    overflow: hidden; -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; background: var(--bg);
    padding-top: max(16px, env(safe-area-inset-top));
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header small { font-size: 11px; color: var(--muted); }
  .header .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-left: 6px; vertical-align: middle;
  }
  .gear-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 10px; font-size: 16px; cursor: pointer; color: var(--muted);
  }

  /* Messages area */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 8px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 85%; padding: 12px 16px; border-radius: 18px;
    font-size: 14px; line-height: 1.5; animation: fadeIn 0.2s ease;
  }
  .msg.user {
    align-self: flex-end; background: var(--accent); color: #fff;
    border-bottom-right-radius: 6px;
  }
  .msg.bot {
    align-self: flex-start; background: var(--surface2);
    border: 1px solid var(--border); border-bottom-left-radius: 6px;
  }
  .msg .meta {
    font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px;
  }
  .msg.bot .meta { color: var(--muted); }
  .msg .tag {
    display: inline-block; background: rgba(255,255,255,0.15); border-radius: 6px;
    padding: 2px 8px; font-size: 11px; font-weight: 600; margin-top: 6px;
  }
  .msg.bot .tag { background: var(--surface); border: 1px solid var(--border); }

  .date-sep {
    text-align: center; font-size: 11px; color: var(--muted);
    padding: 12px 0 4px;
  }

  .typing { align-self: flex-start; padding: 14px 20px; }
  .typing span {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  /* Input area */
  .input-area {
    padding: 12px 16px; border-top: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .input-row {
    display: flex; gap: 8px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; padding: 4px 4px 4px 16px;
  }
  .input-row input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 15px; font-family: inherit;
  }
  .input-row input::placeholder { color: #444; }
  .send-btn {
    width: 40px; height: 40px; border-radius: 12px; border: none;
    background: var(--accent); color: #fff; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .send-btn:disabled { opacity: 0.3; cursor: default; }

  /* Summary panel */
  .summary-toggle {
    text-align: center; padding: 8px;
  }
  .summary-toggle button {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    color: var(--muted); font-size: 12px; font-weight: 600; padding: 6px 16px;
    cursor: pointer; font-family: inherit;
  }
  .summary-panel {
    background: var(--surface); border-top: 1px solid var(--border);
    max-height: 50dvh; overflow-y: auto; padding: 16px;
  }
  .summary-panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .topic-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; margin-bottom: 6px;
    background: var(--bg); border: 1px solid var(--border); font-size: 13px;
  }
  .topic-row .dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .topic-row .cat { font-size: 11px; color: var(--muted); }

  /* Settings modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 24px; width: 100%; max-width: 400px;
  }
  .modal h2 { font-size: 17px; margin-bottom: 18px; }
  .modal label { display: block; font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .modal input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    font-size: 14px; font-family: inherit; margin-bottom: 14px; outline: none;
  }
  .modal .hint { font-size: 11px; color: #555; line-height: 1.5; margin-bottom: 16px; }
  .modal .btns { display: flex; gap: 8px; }
  .modal .btns button {
    flex: 1; padding: 10px; border-radius: 10px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-save { background: var(--accent); border: none; color: #fff; font-weight: 700; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📚 Study Inbox <span class="status-dot" id="statusDot"></span></h1>
    <small id="headerSub">Mande um tema pra estudar</small>
  </div>
  <button class="gear-btn" onclick="toggleSettings()">⚙️</button>
</div>

<div class="messages" id="messages"></div>

<div class="summary-toggle" id="summaryToggle" style="display:none">
  <button onclick="toggleSummary()">📋 <span id="summaryLabel">Ver todos os temas</span></button>
</div>
<div class="summary-panel" id="summaryPanel" style="display:none"></div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="topicInput" placeholder="O que quer estudar?" autocomplete="off"
      onkeydown="if(event.key==='Enter')addTopic()">
    <button class="send-btn" id="sendBtn" onclick="addTopic()">↑</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="settingsModal" style="display:none">
  <div class="modal">
    <h2>⚙️ Configurações</h2>
    <label>Claude API Key</label>
    <input type="password" id="cfgApiKey" placeholder="sk-ant-...">
    <label>GitHub Token</label>
    <input type="password" id="cfgGhToken" placeholder="ghp_...">
    <label>GitHub Usuário/Org</label>
    <input type="text" id="cfgGhOwner" placeholder="seu-usuario">
    <label>Repositório</label>
    <input type="text" id="cfgGhRepo" placeholder="meu-vault">
    <label>Pasta no vault (opcional)</label>
    <input type="text" id="cfgBasePath" placeholder="estudos/inbox">
    <p class="hint">
      Claude API Key: <b>console.anthropic.com</b> → API Keys<br>
      GitHub Token: Settings → Developer settings → Fine-grained tokens (escopo <b>Contents: Read & Write</b>)
    </p>
    <div class="btns">
      <button class="btn-cancel" onclick="toggleSettings()">Cancelar</button>
      <button class="btn-save" onclick="saveSettings()">Salvar</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let config = JSON.parse(localStorage.getItem('si-config') || '{}');
let topics = JSON.parse(localStorage.getItem('si-topics') || '[]');
let busy = false;
let summaryOpen = false;

const $ = id => document.getElementById(id);

function init() {
  updateStatusDot();
  renderMessages();
  updateSummaryToggle();
  if (!config.apiKey) {
    addBotMsg("Bem-vindo! Configure suas chaves no ⚙️ para começar. Depois é só mandar o tema que quer estudar.", false);
  } else if (topics.length === 0) {
    addBotMsg("Pronto! Manda o tema que quer estudar. Eu classifico, gero a nota e mando pro seu vault.", false);
  }
  $('topicInput').focus();
}

// --- Settings ---
function toggleSettings() {
  const m = $('settingsModal');
  const showing = m.style.display === 'none';
  m.style.display = showing ? 'flex' : 'none';
  if (showing) {
    $('cfgApiKey').value = config.apiKey || '';
    $('cfgGhToken').value = config.ghToken || '';
    $('cfgGhOwner').value = config.ghOwner || '';
    $('cfgGhRepo').value = config.ghRepo || '';
    $('cfgBasePath').value = config.basePath || '';
  }
}

function saveSettings() {
  config = {
    apiKey: $('cfgApiKey').value.trim(),
    ghToken: $('cfgGhToken').value.trim(),
    ghOwner: $('cfgGhOwner').value.trim(),
    ghRepo: $('cfgGhRepo').value.trim(),
    basePath: $('cfgBasePath').value.trim(),
  };
  localStorage.setItem('si-config', JSON.stringify(config));
  toggleSettings();
  updateStatusDot();
  if (config.apiKey && config.ghToken) {
    addBotMsg("Configurado! Agora manda um tema.", false);
  }
}

function isReady() { return config.apiKey && config.ghToken && config.ghOwner && config.ghRepo; }

function updateStatusDot() {
  $('statusDot').style.background = isReady() ? 'var(--green)' : 'var(--yellow)';
  const n = topics.length;
  $('headerSub').textContent = n > 0 ? `${n} tema${n>1?'s':''} enviado${n>1?'s':''}` : 'Mande um tema pra estudar';
}

// --- Messages UI ---
function scrollBottom() {
  const m = $('messages');
  setTimeout(() => m.scrollTop = m.scrollHeight, 50);
}

function addUserMsg(text) {
  const m = $('messages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  m.appendChild(d);
  scrollBottom();
}

function addBotMsg(text, save = true) {
  const m = $('messages');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = text;
  m.appendChild(d);
  scrollBottom();
  return d;
}

function showTyping() {
  const m = $('messages');
  const d = document.createElement('div');
  d.className = 'msg bot typing';
  d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  m.appendChild(d);
  scrollBottom();
}

function hideTyping() {
  const el = $('typing');
  if (el) el.remove();
}

function renderMessages() {
  // Show recent topics as chat history on load
  const m = $('messages');
  const recent = topics.slice(-20);
  if (recent.length === 0) return;

  const today = new Date().toLocaleDateString('pt-BR');
  let lastDate = '';

  recent.forEach(t => {
    const d = new Date(t.createdAt).toLocaleDateString('pt-BR');
    if (d !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.textContent = d === today ? 'Hoje' : d;
      m.appendChild(sep);
      lastDate = d;
    }

    const userEl = document.createElement('div');
    userEl.className = 'msg user';
    userEl.textContent = t.original;
    m.appendChild(userEl);

    const botEl = document.createElement('div');
    botEl.className = 'msg bot';
    botEl.innerHTML = `${t.emoji} <b>${t.title}</b><br><span class="tag">${t.category}</span> <span class="meta">· ${t.synced ? '✓ no vault' : '⏳ pendente'}</span>`;
    m.appendChild(botEl);
  });
  scrollBottom();
}

// --- Summary ---
function updateSummaryToggle() {
  $('summaryToggle').style.display = topics.length > 0 ? 'block' : 'none';
}

function toggleSummary() {
  summaryOpen = !summaryOpen;
  $('summaryLabel').textContent = summaryOpen ? 'Fechar lista' : 'Ver todos os temas';
  const panel = $('summaryPanel');
  if (!summaryOpen) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  renderSummary();
}

function renderSummary() {
  const grouped = {};
  topics.forEach(t => {
    if (!grouped[t.category]) grouped[t.category] = [];
    grouped[t.category].push(t);
  });

  let html = '<h3>📋 Temas enviados</h3>';
  Object.entries(grouped).forEach(([cat, items]) => {
    html += `<div style="font-size:11px;color:var(--muted);font-weight:700;margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px">${cat}</div>`;
    items.forEach(t => {
      html += `<div class="topic-row">
        <span class="dot" style="background:${t.synced ? 'var(--green)' : 'var(--yellow)'}"></span>
        <div style="flex:1">${t.emoji} ${t.title}</div>
        <span class="cat">${new Date(t.createdAt).toLocaleDateString('pt-BR')}</span>
      </div>`;
    });
  });
  $('summaryPanel').innerHTML = html;
}

// --- Core: Add Topic ---
async function addTopic() {
  const input = $('topicInput');
  const text = input.value.trim();
  if (!text || busy) return;

  if (!isReady()) {
    addBotMsg("⚠️ Configura as chaves primeiro no ⚙️");
    return;
  }

  busy = true;
  input.value = '';
  $('sendBtn').disabled = true;

  addUserMsg(text);
  showTyping();

  try {
    // 1. Claude classifica e gera nota
    const classified = await classifyWithClaude(text);
    hideTyping();

    const topic = {
      id: Date.now().toString(),
      original: text,
      title: classified.title || text,
      category: classified.category || 'Outros',
      emoji: classified.emoji || '📌',
      filename: classified.filename || slugify(text),
      note: classified.note || `# ${text}\n\n_A preencher._`,
      synced: false,
      createdAt: new Date().toISOString(),
    };

    topics.push(topic);
    saveTopic();

    addBotMsg(`${topic.emoji} <b>${topic.title}</b><br><span class="tag">${topic.category}</span> <span class="meta">· enviando pro vault...</span>`);

    // 2. Push to GitHub
    try {
      const basePath = config.basePath ? config.basePath.replace(/\/+$/, '') + '/' : '';

      // Push note
      const notePath = basePath + topic.filename + '.md';
      await githubPush(notePath, topic.note, `📝 ${topic.title}`);

      // Update index
      const indexMd = generateIndex();
      const indexPath = basePath + '_Temas para Estudar.md';
      await githubPush(indexPath, indexMd, `📚 +${topic.title}`);

      topic.synced = true;
      saveTopic();

      // Update last bot msg
      const msgs = document.querySelectorAll('.msg.bot');
      const last = msgs[msgs.length - 1];
      if (last) {
        last.innerHTML = `${topic.emoji} <b>${topic.title}</b><br><span class="tag">${topic.category}</span> <span class="meta">· ✓ no vault</span>`;
      }
    } catch (e) {
      console.error('GitHub error:', e);
      const msgs = document.querySelectorAll('.msg.bot');
      const last = msgs[msgs.length - 1];
      if (last) {
        last.innerHTML += `<br><span class="meta" style="color:var(--accent)">⚠️ Erro GitHub: ${e.message}</span>`;
      }
    }

  } catch (e) {
    hideTyping();
    addBotMsg(`⚠️ Erro: ${e.message}`);
  }

  busy = false;
  $('sendBtn').disabled = false;
  updateStatusDot();
  updateSummaryToggle();
  input.focus();
}

// --- Claude API ---
async function classifyWithClaude(topic) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': config.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content:
        `Você é um assistente de estudos. Dado o tema abaixo:
1. Classifique em UMA categoria: Programação, Ciência, Filosofia, Matemática, Negócios, Design, Produtividade, Outros
2. Crie um título claro
3. Gere uma nota de estudo em Markdown com: visão geral, por que é importante, tópicos-chave, e recursos sugeridos.

Responda APENAS com JSON puro (sem backticks, sem markdown):
{"category":"...","title":"...","emoji":"...","filename":"slug-sem-acentos","note":"# Título\\n\\n...markdown da nota..."}

Tema: "${topic}"`
      }],
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API ${res.status}`);
  }

  const data = await res.json();
  const text = data.content?.map(b => b.text || '').join('') || '';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

// --- GitHub API ---
async function githubPush(filePath, content, message) {
  const encoded = btoa(unescape(encodeURIComponent(content)));

  // Check if file exists to get SHA
  let sha = null;
  const getRes = await fetch(
    `https://api.github.com/repos/${config.ghOwner}/${config.ghRepo}/contents/${encodeURIComponent(filePath)}`,
    { headers: { Authorization: `Bearer ${config.ghToken}`, Accept: 'application/vnd.github.v3+json' } }
  );
  if (getRes.ok) {
    const existing = await getRes.json();
    sha = existing.sha;
  }

  const body = { message, content: encoded };
  if (sha) body.sha = sha;

  const putRes = await fetch(
    `https://api.github.com/repos/${config.ghOwner}/${config.ghRepo}/contents/${encodeURIComponent(filePath)}`,
    {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${config.ghToken}`,
        'Content-Type': 'application/json',
        Accept: 'application/vnd.github.v3+json',
      },
      body: JSON.stringify(body),
    }
  );

  if (!putRes.ok) {
    const err = await putRes.json().catch(() => ({}));
    throw new Error(err.message || `GitHub ${putRes.status}`);
  }
}

function generateIndex() {
  const grouped = {};
  topics.forEach(t => {
    if (!grouped[t.category]) grouped[t.category] = [];
    grouped[t.category].push(t);
  });
  let md = `# 📚 Temas para Estudar\n\n`;
  md += `> Atualizado: ${new Date().toLocaleString('pt-BR')}\n\n`;
  Object.entries(grouped).forEach(([cat, items]) => {
    md += `## ${cat}\n\n`;
    items.forEach(t => {
      md += `- [ ] ${t.emoji} [[${t.filename}|${t.title}]]\n`;
    });
    md += '\n';
  });
  return md;
}

// --- Helpers ---
function slugify(text) {
  return text.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function saveTopic() {
  localStorage.setItem('si-topics', JSON.stringify(topics));
}

// --- Init ---
init();
</script>
</body>
</html>
